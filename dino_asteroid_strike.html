<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Chrome Dino: Asteroid Strike</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  /* --- BASE & SHELL STYLING --- */
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 20px;
    background-color: #2b2b2b;
    font-family: 'Press Start 2P', monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    color: #333;
  }

  .shell {
    background-color: #d1d5d8;
    border-radius: 20px 20px 50px 20px;
    padding: 20px;
    width: 380px;
    box-shadow: inset -5px -5px 15px rgba(0,0,0,0.2), 10px 10px 20px rgba(0,0,0,0.5);
    border: 2px solid #a0a5a8;
  }

  .face-tab {
    text-align: center;
    font-size: 10px;
    color: #888;
    margin-bottom: 15px;
  }

  .pixel-box {
    background: #e0e0e0;
    border-radius: 10px;
    padding: 15px;
  }

  /* --- SCREEN STYLING --- */
  .screen-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  
  .screen-head h2 {
    font-size: 14px;
    margin: 0;
    text-transform: uppercase;
  }

  .small-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    padding: 8px;
    border: 2px solid #333;
    background: #fff;
    color: #333;
    cursor: pointer;
    box-shadow: 2px 2px 0 #333;
  }
  .small-btn:active { transform: translate(2px, 2px); box-shadow: none; }

  /* FIX: these color classes were referenced in the HTML but never defined,
     so every action button rendered as plain white. */
  .small-btn.pink  { background: #ffb3c6; color: #6b0f27; }
  .small-btn.blue  { background: #a8d8ff; color: #0b3d5c; }
  .small-btn.yellow{ background: #ffe89b; color: #5c4300; }

  .game-hud {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    margin-bottom: 10px;
    padding: 5px;
    background: #535353;
    color: #f7f7f7;
    border-radius: 4px;
  }

  .game-screen {
    position: relative;
    background-color: #f7f7f7;
    border: 4px solid #535353;
    border-radius: 8px;
    overflow: hidden;
    height: 300px;
    display: flex;
    justify-content: center;
  }

  canvas {
    display: block;
    background-color: #f7f7f7; /* FIX: opaque backing so clearRect "holes" in sprites never show a transparent/checkered glitch */
  }

  .game-overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(247, 247, 247, 0.85);
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    line-height: 1.5;
    font-size: 12px;
    color: #535353;
  }
  .hidden { display: none !important; }

  #mockCanvas {
    display: block;
    margin: 0 auto 6px;
  }
  #mockTaunt {
    background: #fff;
    border: 2px solid #535353;
    border-radius: 8px;
    padding: 4px 8px;
    font-size: 9px;
    color: #c93a55;
    margin: 0 auto 8px;
    display: inline-block;
    max-width: 180px;
  }

  .game-actions {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 15px;
  }

  /* --- NINTENDO STYLE CONTROLS --- */
  .controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 30px;
    padding: 0 10px;
  }

  /* --- NINTENDO STYLE CONTROLS --- */
  .dpad {
    display: grid;
    grid-template-columns: 36px 36px 36px;
    grid-template-rows: 36px 36px 36px;
    gap: 2px;
    width: fit-content;
  }

  /* Position the buttons in the grid */
  .dbtn.up    { grid-row: 1; grid-column: 2; }
  .dbtn.left  { grid-row: 2; grid-column: 1; }
  .dbtn.right { grid-row: 2; grid-column: 3; }
  .dbtn.down  { grid-row: 3; grid-column: 2; }

  /* Styling for the cross shape */
  .dbtn {
    background-color: #333;
    color: #f7f7f7;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: inset -2px -2px 5px rgba(0,0,0,0.5);
    width: 36px;
    height: 36px;
    font-size: 14px;
  }
  .dbtn:active { box-shadow: inset 2px 2px 5px rgba(0,0,0,0.8); }


  .action-btn {
    width: 60px;
    height: 60px;
    background-color: #c93a55;
    border: none;
    border-radius: 50%;
    box-shadow: 2px 5px 0 #8a1f33, inset -2px -2px 10px rgba(0,0,0,0.3);
    color: #ffffff; /* FIX: was #ff91a5, nearly invisible against the #c93a55 background */
    font-family: 'Press Start 2P', monospace;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .action-btn:active {
    transform: translateY(3px);
    box-shadow: 2px 2px 0 #8a1f33, inset -2px -2px 10px rgba(0,0,0,0.3);
  }

  footer {
    text-align: center;
    margin-top: 20px;
    font-size: 8px;
    color: #888;
    line-height: 1.5;
  }
  footer small { display: block; }

</style>
</head>
<body>

<div class="shell">
  <div class="face-tab" aria-hidden="true">( ^ - ^ )</div>

  <main class="pixel-box view is-active" id="view-game">
    <div class="screen-head">
      <h2 id="gameTitle">ASTEROID STRIKE</h2>
    </div>

    <div class="game-hud">
      <span id="hudScore">HI 00000 00000</span>
      <span id="hudExtra">LVL 1</span>
    </div>

    <div class="game-screen">
      <canvas id="gameCanvas" width="300" height="300"></canvas>
      <div class="game-overlay" id="gameOverlay">
        <div>
          <canvas id="mockCanvas" width="70" height="70" class="hidden"></canvas>
          <p id="mockTaunt" class="hidden"></p>
          <p id="overlayText">PRESS START<br><br><span style="font-size:8px;">OR SPACEBAR</span></p>
        </div>
      </div>
    </div>

    <div class="game-actions">
      <button class="small-btn pink" id="btnGameStart">START</button>
      <button class="small-btn blue" id="btnGamePause">PAUSE</button>
      <button class="small-btn yellow" id="btnGameReset">RESET</button>
    </div>

    <div class="controls">
      <div class="dpad">
        <button class="dbtn up" data-dir="up" aria-label="Up">▲</button>
        <button class="dbtn left" data-dir="left" aria-label="Left">◀</button>
        <button class="dbtn right" data-dir="right" aria-label="Right">▶</button>
        <button class="dbtn down" data-dir="down" aria-label="Down">▼</button>
      </div>
      <button class="action-btn" id="btnGameAction">A</button>
    </div>
  </main>

  <footer>
    <span>Pixel Arcade OS v.02</span>
    <small>Developed by Tee</small>
  </footer>
</div>

<script>
  // --- Game Engine Setup ---
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const overlay = document.getElementById('gameOverlay');
  const overlayText = document.getElementById('overlayText');
  const hudScore = document.getElementById('hudScore');
  const hudExtra = document.getElementById('hudExtra');
  const mockCanvas = document.getElementById('mockCanvas');
  const mockCtx = mockCanvas.getContext('2d');
  const mockTaunt = document.getElementById('mockTaunt');
  const BG_COLOR = '#f7f7f7';

  const TAUNTS = [
    "HAHA! TOO SLOW!",
    "IS THAT ALL YOU GOT?",
    "SKILL ISSUE.",
    "GET REKT, HUMAN.",
    "TRY AGAIN, TINY.",
    "EASY CLAP.",
    "BACK TO THE EGG WITH YOU."
  ];

  function drawMockingDino() {
    mockCtx.clearRect(0, 0, mockCanvas.width, mockCanvas.height);
    mockCtx.save();
    mockCtx.translate(5, 5);
    mockCtx.scale(2.2, 2.2);

    mockCtx.fillStyle = '#c93a55';
    // head
    mockCtx.fillRect(10, 0, 10, 10);
    // winking eye (closed, smug)
    mockCtx.fillStyle = '#535353';
    mockCtx.fillRect(12, 3, 3, 1);
    mockCtx.fillStyle = '#c93a55';
    // body
    mockCtx.fillRect(4, 6, 8, 10);
    mockCtx.fillRect(8, 12, 10, 6);
    mockCtx.fillRect(0, 4, 4, 6);
    // legs, one kicked up like it's laughing/pointing
    mockCtx.fillRect(6, 18, 4, 4);
    mockCtx.save();
    mockCtx.translate(14, 18);
    mockCtx.rotate(0.5);
    mockCtx.fillRect(0, 0, 4, 4);
    mockCtx.restore();
    // tongue sticking out
    mockCtx.fillStyle = '#ff91a5';
    mockCtx.fillRect(20, 6, 4, 2);

    mockCtx.restore();
  }

  // Easier Difficulty Tuning
  const BASE_SPEED = 1.2;
  const ENEMY_SPAWN_RATE_START = 65;
  const MIN_SPAWN_RATE = 20;

  // Big Dino ("Boss") tuning
  const BIG_DINO_MIN_LEVEL = 3;     // doesn't show up until things have already ramped up
  const BIG_DINO_HP = 3;            // takes 3 hits to bring down
  const BIG_DINO_SCORE = 50;

  let score = 0;
  let hiScore = 0;
  let level = 1;
  let gameState = 'START'; 
  let frameCount = 0;
  let levelUpFlashTimer = 0;

  // --- Input Handling ---
  const keys = { left: false, right: false, action: false };

  // Keyboard
  document.addEventListener('keydown', (e) => {
    if (e.code === 'ArrowLeft') keys.left = true;
    if (e.code === 'ArrowRight') keys.right = true;
    if (e.code === 'Space') {
      keys.action = true;
      e.preventDefault();
      if (gameState !== 'PLAYING') handleStartReset();
    }
  });
  document.addEventListener('keyup', (e) => {
    if (e.code === 'ArrowLeft') keys.left = false;
    if (e.code === 'ArrowRight') keys.right = false;
    if (e.code === 'Space') keys.action = false;
  });

  // On-Screen UI Controls
  const dpadLeft = document.querySelector('.dbtn.left');
  const dpadRight = document.querySelector('.dbtn.right');
  const btnAction = document.getElementById('btnGameAction');

  // Only left/right are used by this game.
  dpadLeft.addEventListener('mousedown', () => keys.left = true);
  dpadLeft.addEventListener('mouseup', () => keys.left = false);
  dpadLeft.addEventListener('touchstart', (e) => { e.preventDefault(); keys.left = true; });
  dpadLeft.addEventListener('touchend', (e) => { e.preventDefault(); keys.left = false; });

  dpadRight.addEventListener('mousedown', () => keys.right = true);
  dpadRight.addEventListener('mouseup', () => keys.right = false);
  dpadRight.addEventListener('touchstart', (e) => { e.preventDefault(); keys.right = true; });
  dpadRight.addEventListener('touchend', (e) => { e.preventDefault(); keys.right = false; });


  btnAction.addEventListener('mousedown', () => { keys.action = true; handleStartReset(); });
  btnAction.addEventListener('mouseup', () => keys.action = false);
  btnAction.addEventListener('touchstart', (e) => { e.preventDefault(); keys.action = true; handleStartReset(); });
  btnAction.addEventListener('touchend', (e) => { e.preventDefault(); keys.action = false; });

  // Buttons
  document.getElementById('btnGameStart').addEventListener('click', () => {
    if (gameState !== 'PLAYING') handleStartReset();
  });
  document.getElementById('btnGamePause').addEventListener('click', () => {
    if (gameState === 'PLAYING') {
      gameState = 'PAUSED';
      overlayText.innerHTML = "PAUSED";
      overlay.classList.remove('hidden');
    } else if (gameState === 'PAUSED') {
      gameState = 'PLAYING';
      overlay.classList.add('hidden');
      gameLoop();
    }
  });
  document.getElementById('btnGameReset').addEventListener('click', resetGame);


  function handleStartReset() {
    if (gameState === 'START' || gameState === 'GAMEOVER') {
      resetGame();
      gameState = 'PLAYING';
      overlay.classList.add('hidden');
      mockCanvas.classList.add('hidden');
      mockTaunt.classList.add('hidden');
      gameLoop();
    }
  }

  // --- Entities ---
  const player = {
    x: 135, y: 270, w: 24, h: 24, 
    speed: 5.5,
    cooldown: 0,
    draw() {
      ctx.fillStyle = '#535353'; 
      ctx.fillRect(this.x + 8, this.y, 8, 10);
      ctx.fillRect(this.x, this.y + 10, 24, 14);
      ctx.fillRect(this.x - 4, this.y + 16, 4, 8);
      ctx.fillRect(this.x + 24, this.y + 16, 4, 8);
    },
    update() {
      if (keys.left && this.x > 5) this.x -= this.speed;
      if (keys.right && this.x < canvas.width - this.w - 5) this.x += this.speed;
      
      if (this.cooldown > 0) this.cooldown--;
      
      // Shooting
      if (keys.action && this.cooldown === 0) {
        asteroids.push({ x: this.x + 10, y: this.y, w: 4, h: 8, speed: 7 });
        this.cooldown = 6;
      }
    }
  };

  let asteroids = [];
  let dinos = [];
  let booms = []; // comic-style explosion effects

  class Dino {
    constructor(big = false) {
      this.big = big;
      this.w = big ? 34 : 20;
      this.h = big ? 38 : 22;
      this.x = Math.random() * (canvas.width - this.w - 10) + 5;
      this.y = -this.h - 5;

      let speedMult = 1 + (level * 0.1);
      // Big dinos are tankier so they move a little slower to stay fair
      const speedScale = big ? 0.65 : 1;
      this.speed = (BASE_SPEED + Math.random() * 1.5) * speedMult * speedScale;

      this.isErratic = !big && level > 4 && Math.random() > 0.7;
      this.xDir = Math.random() > 0.5 ? 1 : -1;

      this.hp = big ? BIG_DINO_HP : 1;
      this.maxHp = this.hp;
      this.hitFlash = 0; // frames remaining to render a "just hit" flash
    }
    draw() {
      const scale = this.w / 20; // base sprite was designed at w=20
      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.scale(scale, scale);

      ctx.fillStyle = this.hitFlash > 0 ? '#c93a55' : (this.big ? '#7a3b8f' : '#535353');
      ctx.fillRect(10, 0, 10, 10);
      // FIX: the eye used to be punched out with clearRect, which cuts a
      // transparent hole straight through the canvas (the checkerboard/glitch
      // look). Painting it with the background color instead keeps it opaque.
      ctx.fillStyle = BG_COLOR;
      ctx.fillRect(12, 2, 2, 2);
      ctx.fillStyle = this.hitFlash > 0 ? '#c93a55' : (this.big ? '#7a3b8f' : '#535353');
      ctx.fillRect(4, 6, 8, 10);
      ctx.fillRect(8, 12, 10, 6);
      ctx.fillRect(0, 4, 4, 6);
      ctx.fillRect(6, 18, 4, 4);
      ctx.fillRect(12, 18, 4, 4);

      ctx.restore();

      if (this.hitFlash > 0) this.hitFlash--;

      // Little HP pips above tough dinos so the player can see progress
      if (this.big) {
        const pipW = 6, gap = 2;
        const totalW = this.maxHp * pipW + (this.maxHp - 1) * gap;
        let px = this.x + this.w / 2 - totalW / 2;
        for (let i = 0; i < this.maxHp; i++) {
          ctx.fillStyle = i < this.hp ? '#7a3b8f' : '#c7c7c7';
          ctx.fillRect(px, this.y - 8, pipW, 4);
          px += pipW + gap;
        }
      }
    }
    update() {
      this.y += this.speed;
      if (this.isErratic) {
        this.x += this.xDir * 1.2;
        if (this.x <= 0 || this.x + this.w >= canvas.width) this.xDir *= -1;
      }
    }
  }

  // --- Comic "BOOM" explosion effect ---
  function spawnBoom(x, y, big = false) {
    booms.push({ x, y, life: 0, maxLife: big ? 26 : 18, big });
  }

  function drawBooms() {
    for (let i = booms.length - 1; i >= 0; i--) {
      const b = booms[i];
      const t = b.life / b.maxLife; // 0 -> 1
      const baseR = b.big ? 34 : 22;
      const r = baseR * (0.3 + 0.9 * Math.min(1, t * 2)); // pop out fast
      const alpha = 1 - t;

      ctx.save();
      ctx.translate(b.x, b.y);
      ctx.globalAlpha = Math.max(0, alpha);

      // Jagged comic starburst
      const spikes = 10;
      ctx.beginPath();
      for (let s = 0; s < spikes * 2; s++) {
        const ang = (Math.PI * s) / spikes;
        const rad = s % 2 === 0 ? r : r * 0.5;
        const px = Math.cos(ang) * rad;
        const py = Math.sin(ang) * rad;
        if (s === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fillStyle = '#ffd23f';
      ctx.fill();
      ctx.lineWidth = 3;
      ctx.strokeStyle = '#535353';
      ctx.stroke();

      if (t < 0.7) {
        ctx.fillStyle = '#c93a55';
        ctx.font = `bold ${b.big ? 13 : 9}px 'Press Start 2P', monospace`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.save();
        ctx.rotate(-0.08);
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 3;
        ctx.strokeText(b.big ? 'KABOOM!' : 'BOOM!', 0, 0);
        ctx.fillText(b.big ? 'KABOOM!' : 'BOOM!', 0, 0);
        ctx.restore();
      }

      ctx.restore();

      b.life++;
      if (b.life >= b.maxLife) booms.splice(i, 1);
    }
  }

  // --- Game Mechanics ---
  function formatScore(num) {
    return num.toString().padStart(5, '0');
  }

  function spawnLogic() {
    let currentSpawnRate = Math.max(MIN_SPAWN_RATE, ENEMY_SPAWN_RATE_START - (level * 2));
    if (frameCount % currentSpawnRate === 0) {
      // Occasionally spawn a big, tougher dino once the game has ramped up.
      // Chance grows slowly with level, capped so normal dinos still dominate.
      const bigChance = Math.min(0.28, (level - BIG_DINO_MIN_LEVEL) * 0.05);
      const spawnBig = level >= BIG_DINO_MIN_LEVEL && Math.random() < bigChance;
      dinos.push(new Dino(spawnBig));
    }
  }

  function resetGame() {
    score = 0;
    level = 1;
    frameCount = 0;
    levelUpFlashTimer = 0;
    asteroids = [];
    dinos = [];
    booms = [];
    player.x = canvas.width / 2 - 12;
    updateHUD();
    mockCanvas.classList.add('hidden');
    mockTaunt.classList.add('hidden');
  }

  function updateHUD() {
    hudScore.innerText = `HI ${formatScore(hiScore)} ${formatScore(score)}`;
    hudExtra.innerText = `LVL ${level}`;
  }

  function drawDottedBackground() {
    ctx.fillStyle = '#e0e0e0';
    for(let i=0; i<canvas.width; i+=20) {
      for(let j=0; j<canvas.height; j+=20) {
        ctx.fillRect(i, j+(frameCount%20), 2, 2);
      }
    }
  }

  function maybeLevelUp() {
    // Difficulty now ramps with BOTH score and pure survival time, so the
    // game keeps getting tougher even if the player is playing it safe.
    const scoreLevel = Math.floor(score / 200) + 1;
    const timeLevel = Math.floor(frameCount / 900) + 1; // +1 level every ~15s @60fps
    const newLevel = Math.max(scoreLevel, timeLevel);
    if (newLevel > level) {
      level = newLevel;
      levelUpFlashTimer = 40;
      updateHUD();
    }
  }

  function drawLevelUpFlash() {
    if (levelUpFlashTimer <= 0) return;
    ctx.save();
    ctx.globalAlpha = Math.min(1, levelUpFlashTimer / 20) * 0.9;
    ctx.fillStyle = '#535353';
    ctx.font = "bold 14px 'Press Start 2P', monospace";
    ctx.textAlign = 'center';
    ctx.fillText(`LEVEL ${level}!`, canvas.width / 2, 40);
    ctx.restore();
    levelUpFlashTimer--;
  }

  function gameLoop() {
    if (gameState !== 'PLAYING') return;
    frameCount++;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = BG_COLOR;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    drawDottedBackground();

    player.update();
    player.draw();

    maybeLevelUp();

    // Asteroids
    for (let i = asteroids.length - 1; i >= 0; i--) {
      let a = asteroids[i];
      a.y -= a.speed;
      
      ctx.fillStyle = '#535353';
      ctx.fillRect(a.x, a.y, a.w, a.h);
      ctx.fillRect(a.x-1, a.y+1, a.w+2, a.h-2);

      if (a.y < 0) asteroids.splice(i, 1);
    }

    spawnLogic();

    // Dinos & Collisions
    for (let i = dinos.length - 1; i >= 0; i--) {
      let d = dinos[i];
      d.update();
      d.draw();

      if (d.y + d.h > canvas.height) {
        triggerGameOver();
        return;
      }
      
      if (d.x < player.x + player.w && d.x + d.w > player.x &&
          d.y < player.y + player.h && d.y + d.h > player.y) {
        triggerGameOver();
        return;
      }

      for (let j = asteroids.length - 1; j >= 0; j--) {
        let a = asteroids[j];
        if (a.x < d.x + d.w && a.x + a.w > d.x &&
            a.y < d.y + d.h && a.y + a.h > d.y) {

            asteroids.splice(j, 1);
            d.hp--;
            d.hitFlash = 6;
            spawnBoom(d.x + d.w / 2, d.y + d.h / 2, d.big);

            if (d.hp <= 0) {
              dinos.splice(i, 1);
              score += d.big ? BIG_DINO_SCORE : 10;
              if (score > hiScore) hiScore = score;
              updateHUD();
            }
            break;
        }
      }
    }

    drawBooms();
    drawLevelUpFlash();

    requestAnimationFrame(gameLoop);
  }

  function triggerGameOver() {
    gameState = 'GAMEOVER';
    overlayText.innerHTML = "GAME OVER<br><br><span style='font-size:8px;'>PRESS START</span>";

    drawMockingDino();
    mockCanvas.classList.remove('hidden');
    mockTaunt.innerText = TAUNTS[Math.floor(Math.random() * TAUNTS.length)];
    mockTaunt.classList.remove('hidden');

    overlay.classList.remove('hidden');
    
    ctx.fillStyle = '#535353';
    ctx.fillRect(0,0, canvas.width, canvas.height);
  }

  updateHUD();

</script>
</body>
</html>
